openapi: 3.0.0
info:
  title: Sistema Livro - API de Denúncias
  description: Gestão completa de denúncias, incluindo busca avançada, atribuição de fiscais e exportação.
  version: 1.0.0

paths:
  # --- Web Interface (denunciationsController.js) ---
  /:
    get:
      tags: [Web Interface]
      summary: Home - Listagem Geral
      parameters:
        - $ref: '#/components/parameters/limit'
        - $ref: '#/components/parameters/offset'
      responses:
        '200':
          description: HTML da página inicial.

  /denuncias/new:
    get:
      tags: [Web Interface]
      summary: Formulário de Cadastro
      responses:
        '200':
          description: Retorna a view 'denunciation/new'.

  /denuncias:
    post:
      tags: [Web Interface]
      summary: Registrar Denúncia
      description: Lógica via `denunciationsService.createDenunciation`. Valida bairro e gera número sequencial.
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DenunciationInput'
      responses:
        '302':
          description: Redireciona para home.
        '400':
          description: Erro de validação (ex: Bairro não encontrado).

  /buscar/resultados:
    get:
      tags: [Web Interface]
      summary: Busca Avançada
      description: Utiliza o `denunciationsQueryBuilder` para filtrar por múltiplos campos.
      parameters:
        - name: year
          in: query
          schema: { type: integer }
        - name: number
          in: query
          schema: { type: integer }
        - name: endereco
          in: query
          description: Limpa prefixos como 'Rua' ou 'Av' automaticamente.
          schema: { type: string }
        - name: bairro
          in: query
          schema: { type: string }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/StatusEnum' }
      responses:
        '200':
          description: HTML com resultados filtrados.

  /atribuir/{denunciaId}:
    post:
      tags: [Web Interface]
      summary: Atribuir Fiscal
      description: Vincula um usuário e altera o status para EM_ANDAMENTO.
      parameters:
        - $ref: '#/components/parameters/denunciationId'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                userId: { type: integer }
                redirectToShow: { type: boolean }
      responses:
        '302':
          description: Redireciona com mensagem de sucesso.

  # --- Exportação (denunciationsExportController.js) ---
  /denuncias/pdf:
    get:
      tags: [Export]
      summary: Gerar Relatório PDF
      parameters:
        - name: fiscalId
          in: query
          required: true
          schema: { type: integer }
        - name: status
          in: query
          schema: { $ref: '#/components/schemas/StatusEnum' }
      responses:
        '200':
          content:
            application/pdf:
              schema: { type: string, format: binary }

  # --- API JSON (denunciationsApiController.js) ---
  /api/denuncias:
    get:
      tags: [API]
      summary: Listar Denúncias (JSON)
      responses:
        '200':
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/DenunciationOutput'

components:
  parameters:
    denunciationId:
      name: id
      in: path
      required: true
      schema: { type: integer }
    limit:
      name: limit
      in: query
      schema: { type: integer, default: 50 }
    offset:
      name: offset
      in: query
      schema: { type: integer, default: 0 }

  schemas:
    StatusEnum:
      type: string
      enum: [REGISTRADA, EM_ANDAMENTO, NOTIFICADA, EM_PUBLICACAO, FEITO_AIF, PENDENTE, FINALIZADA]

    DenunciationInput:
      type: object
      required: [title, description, endereco, numero, bairro]
      properties:
        title: { type: string }
        description: { type: string }
        registration_type: { type: string, example: "Ofício Recebido" }
        endereco: { type: string }
        numero: { type: string }
        bairro: { type: string }
        complemento: { type: string }

    DenunciationOutput:
      allOf:
        - $ref: '#/components/schemas/DenunciationInput'
        - type: object
          properties:
            id: { type: integer }
            year: { type: integer }
            number: { type: integer }
            status: { type: string }
            user:
              type: object
              properties:
                name: { type: string }