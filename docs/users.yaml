openapi: 3.0.0
info:
  title: Sistema Livro - Gestão de Usuários e Área Fiscal
  description: API para administração de usuários e acesso ao dashboard de produtividade dos fiscais.
  version: 1.0.0

paths:
  # --- Gestão Administrativa ---
  /cadastro/usuario:
    get:
      tags: [Users Admin]
      summary: Listar todos os usuários para gestão
      description: Retorna a página de cadastro contendo todos os usuários ordenados alfabeticamente.
      responses:
        '200':
          description: HTML da view 'users/new' carregado.
        '500':
          $ref: '#/components/responses/ServerError'

  /usuario/registrar:
    post:
      tags: [Users Admin]
      summary: Criar novo usuário
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: Nome completo do usuário.
              required: [username]
      responses:
        '302':
          description: Usuário criado. Redireciona para /cadastro/usuario.

  /editar-usuario/{id}:
    get:
      tags: [Users Admin]
      summary: Formulário de edição
      parameters:
        - $ref: '#/components/parameters/userId'
      responses:
        '200':
          description: HTML da view 'users/edit'.
        '404':
          $ref: '#/components/responses/NotFound'

  /usuario/atualizar/{id}:
    post:
      tags: [Users Admin]
      summary: Atualizar dados ou status do usuário
      description: Permite renomear o usuário ou alternar seu estado (Ativo/Inativo).
      parameters:
        - $ref: '#/components/parameters/userId'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                active:
                  type: string
                  description: Se presente no body (checkbox 'on'), o status 'ativo' é invertido no banco.
      responses:
        '302':
          description: Redireciona para a página de gestão.

  # --- Fluxo de Trabalho Fiscal ---
  /area-fiscal:
    get:
      tags: [Fiscal]
      summary: Seleção de Fiscal
      description: Lista apenas usuários com `ativo: true` para entrada no dashboard.
      responses:
        '200':
          description: HTML da view 'users/select'.

  /area-fiscal/{id}:
    get:
      tags: [Fiscal]
      summary: Dashboard do Fiscal
      description: Exibe as denúncias atribuídas ao fiscal com suporte a paginação e filtro por status.
      parameters:
        - $ref: '#/components/parameters/userId'
        - in: query
          name: status
          schema:
            type: string
            default: ALL
          description: Filtra por slug de status (Ex: REGISTRADA, NOTIFICADA).
        - in: query
          name: page
          schema:
            type: integer
            default: 1
      responses:
        '200':
          description: Dashboard carregado com lista de denúncias e contadores de status.

components:
  parameters:
    userId:
      name: id
      in: path
      required: true
      schema:
        type: integer

  responses:
    NotFound:
      description: Usuário não encontrado.
    ServerError:
      description: Erro interno (geralmente renderiza a view 'error').

  schemas:
    User:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        ativo: { type: boolean, default: true }