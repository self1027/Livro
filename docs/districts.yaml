openapi: 3.0.0
info:
  title: Sistema Livro - Módulo de Distritos
  version: 1.0.0
  description: Gestão de bairros para validação de endereços das denúncias.

paths:
  /bairros:
    get:
      tags: [Territórios]
      summary: Listar todos os bairros cadastrados
      responses:
        '200':
          description: Retorna a view 'district/index' ordenada por nome.
    post:
      tags: [Territórios]
      summary: Cadastrar novo bairro
      description: O sistema limpa espaços e gera o slug automaticamente.
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
                  example: "Centro"
              required: [name]
      responses:
        '302':
          description: Redireciona com query param de sucesso ou erro (ex. 409 duplicado).

  /bairros/{id}:
    post:
      tags: [Territórios]
      summary: Editar nome do bairro
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                name:
                  type: string
      responses:
        '302':
          description: Redireciona após atualização e re-geração do slug.

components:
  schemas:
    District:
      type: object
      properties:
        id: { type: integer }
        name: { type: string }
        slug: { type: string, readOnly: true }