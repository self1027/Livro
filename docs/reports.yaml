openapi: 3.0.0
info:
  title: Sistema Livro - API de Denúncias e Relatórios
  description: Gestão do ciclo de vida de fiscalização, desde o registro da denúncia até os relatórios de campo.
  version: 1.0.0

paths:
  # --- MÓDULO DE DENÚNCIAS ---
  /denuncias:
    post:
      tags: [Denunciations]
      summary: Criar nova denúncia
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/DenunciationInput'
      responses:
        '302':
          description: Sucesso. Redireciona para a listagem.
        '400':
          $ref: '#/components/responses/BadRequest'

  /atribuir/{denunciaId}:
    post:
      tags: [Denunciations]
      summary: Atribuir fiscal à denúncia
      parameters:
        - $ref: '#/components/parameters/denunciationId'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                userId: { type: integer }
      responses:
        '302':
          description: Redireciona com o resultado da atribuição.

  # --- MÓDULO DE RELATÓRIOS (Reports) ---
  /denuncia/{id}/adicionar-relatorio:
    post:
      tags: [Reports]
      summary: Adicionar Histórico ou Mudança de Status
      description: |
        O sistema processa dois tipos de registros aqui:
        1. TEXTO: Relato livre do fiscal.
        2. STATUS_CHANGE: Gerado automaticamente se o campo 'status' for alterado.
      parameters:
        - $ref: '#/components/parameters/denunciationIdPath'
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportInput'
      responses:
        '302':
          description: Relatório adicionado. Redireciona para a denúncia.
        '404':
          $ref: '#/components/responses/NotFound'

  /relatorio/{id}/editar:
    post:
      tags: [Reports]
      summary: Editar um relatório existente
      description: Atualiza a descrição e pode sincronizar o novo status com a denúncia pai.
      parameters:
        - $ref: '#/components/parameters/reportId'
      requestBody:
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/ReportInput'
      responses:
        '302':
          description: Redireciona para a denúncia.

  /relatorio/{id}/deletar:
    post:
      tags: [Reports]
      summary: Remover um registro de histórico
      parameters:
        - $ref: '#/components/parameters/reportId'
      responses:
        '302':
          description: Registro removido.

components:
  parameters:
    denunciationIdPath:
      name: id
      in: path
      required: true
      schema: { type: integer }
    denunciationId:
      name: denunciaId
      in: path
      required: true
      schema: { type: integer }
    reportId:
      name: id
      in: path
      required: true
      schema: { type: integer }

  responses:
    BadRequest:
      description: Erro de validação ou dados obrigatórios ausentes.
    NotFound:
      description: O recurso (Denúncia ou Relatório) não foi encontrado.
    ServerError:
      description: Erro interno no processamento.

  schemas:
    DenunciationInput:
      type: object
      required: [title, description, endereco, numero, bairro]
      properties:
        title: { type: string }
        description: { type: string }
        endereco: { type: string }
        numero: { type: string }
        bairro: { type: string }
        registration_type: { type: string }

    ReportInput:
      type: object
      required: [user_id]
      properties:
        description: 
          type: string
          description: Conteúdo textual da fiscalização.
        status: 
          type: string
          description: Novo status para a denúncia (gera log de mudança).
        user_id: 
          type: integer
          description: ID do fiscal que está realizando a ação.

    # Baseado no arquivo reportType.js
    ReportType:
      type: integer
      enum: [0, 1]
      description: "0: STATUS_CHANGE, 1: TEXT"