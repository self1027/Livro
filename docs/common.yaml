components:
  schemas:
    User:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do usuário gerado automaticamente
          example: 1
        name:
          type: string
          description: Nome completo do usuário
          example: "João Silva"
        ativo:
          type: boolean
          description: Indica se o usuário está ativo
          default: true
      required:
        - name
        - ativo

    Denunciation:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da denúncia gerado automaticamente
        year:
          type: integer
          description: Ano de registro
          example: 2023
        number:
          type: integer
          description: Número do processo
          example: 123
        registration_type:
          type: string
          description: Tipo de registro
          enum: [OFICIO, REQUERIMENTO, DENUNCIA]
        status:
          $ref: '#/components/schemas/DenunciationStatusEnum'
          description: Status atual da denúncia
        title:
          type: string
          description: Título curto da denúncia
          example: "Construção irregular"
        description:
          type: string
          description: Descrição detalhada da denúncia
        endereco:
          type: string
          description: Endereço (logradouro)
        numero:
          type: string
          description: Número do endereço
        bairro:
          type: string
          description: Bairro
        complemento:
          type: string
          nullable: true
          description: Complemento do endereço
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data de criação
        user_id:
          type: integer
          nullable: true
          description: ID do fiscal responsável
        sender:
          $ref: '#/components/schemas/DenunciationSender'
          description: Origem da denúncia
      required:
        - year
        - number
        - title
        - description
        - endereco
        - numero
        - bairro

    Report:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do relatório gerado automaticamente
        description:
          type: string
          description: Conteúdo do relatório
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data de criação
        denunciation_id:
          type: integer
          description: ID da denúncia relacionada
        user_id:
          type: integer
          description: ID do usuário autor
        type:
          $ref: '#/components/schemas/ReportType'
          description: Tipo do relatório
      required:
        - description
        - denunciation_id
        - user_id
        - type

    District:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do bairro
        name:
          type: string
          description: Nome do bairro
        slug:
          type: string
          description: Identificador único (slug)
      required:
        - name

    Schedule:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
        week_key:
          type: string
          nullable: true
          description: Identificador da semana
        data:
          type: string
          format: date
          nullable: true
          description: Data específica
        tipo:
          type: string
          enum: [semana, sobrescrito, feriado]
          description: Tipo do agendamento
        nome:
          type: string
          nullable: true
          description: Nome do evento
        anotacao:
          type: string
          nullable: true
          description: Observações
        created_at:
          type: string
          format: date-time
      required:
        - tipo

    # ENUMS E CONSTANTES

    DenunciationStatusEnum:
      type: string
      description: Valores possíveis de status da denúncia
      enum:
        - REGISTRADA
        - EM_ANDAMENTO
        - NOTIFICADA
        - EM_PUBLICACAO
        - FEITO_AIF
        - PENDENTE
        - FINALIZADA

    DenunciationStatus:
      type: object
      description: Configuração completa do status
      properties:
        label:
          type: string
        color:
          type: string
          format: hex-color
        slug:
          type: string
      example:
        label: "Registrada"
        color: "#3498db"
        slug: "REGISTRADA"

    DenunciationSender:
      type: string
      description: Origem da denúncia
      enum:
        - "Denuncia Realizada Presencialmente"
        - "Denuncia Anônima Realizada via Telefone"
        - "Denuncia Recebida de Outro Órgão"
        - "Ofício Recebido"
      example: "Denuncia Realizada Presencialmente"

    ReportType:
      type: integer
      description: Tipo de relatório
      enum: [0, 1]
      x-enum-descriptions:
        - "Relatório de mudança de status"
        - "Relatório textual"

  parameters:
    userId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID do usuário

    denunciationId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID da denúncia

    reportId:
      name: id
      in: path
      required: true
      schema:
        type: integer
      description: ID do relatório

  responses:
    NotFound:
      description: Recurso não encontrado
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Recurso não encontrado"

    ServerError:
      description: Erro interno do servidor
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Erro interno do servidor"

    Unauthorized:
      description: Acesso não autorizado
      content:
        application/json:
          schema:
            type: object
            properties:
              message:
                type: string
                example: "Não autorizado"

  requestBodies:
    DenunciationUpdate:
      description: Dados para atualização da denúncia
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/Denunciation'

    ReportCreate:
      description: Dados para criação de relatório
      required: true
      content:
        application/x-www-form-urlencoded:
          schema:
            $ref: '#/components/schemas/Report'